        <button id="cartButton" onclick="openCart()" class="btn btn-dark rounded-pill px-4">
            <i class="bi bi-bag"></i>
            Cart
            <span id="cartBadge" class="cart-badge">0</span>
        </button>

    </div>

</nav>

<!-- ================= HERO ================= -->

<section class="hero">

    <div class="hero-content">
        <h1>Premium Fashion</h1>
        <p>Timeless clothing designed for everyday confidence.</p>
        <button class="hero-shop-btn">Shop Now</button>
    </div>

    <div class="hero-logo">
        <img
            src="https://drive.google.com/thumbnail?id=1Sw1wNbtdK81kVzQgUwhL6bxaxeG6_ffp&sz=w1000"
            alt="MAGE Stylish Shop">
    </div>

</section>

<!-- ================= SEARCH ================= -->

<section class="search-section">

<div class="search-box">
<input id="searchBox" class="form-control" placeholder="Search products...">
</div>

<div id="categoryBar" class="category-bar">
<button class="category-btn">All</button>
</div>

</section>

<!-- ================= PRODUCTS ================= -->

<div class="container">

<div class="product-section-header">
    <h2>Best Sellers</h2>
    <button type="button" class="view-all-btn">
        View all
        <i class="bi bi-chevron-right"></i>
    </button>
</div>

<div id="productGrid" class="row product-grid">
<div class="text-center">
<div class="spinner-border text-dark"></div>
<p class="mt-3">Loading Products...</p>
</div>
</div>

</div>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<div id="cartOverlay" class="cart-overlay"></div>

<div id="cartPanel" class="cart-panel">

<div class="cart-header">
Shopping Bag
<span class="close-cart" onclick="closeCart()">×</span>
</div>

<div id="cartItems" class="cart-items">Your cart is empty.</div>

<div class="cart-footer">
<h5>
Total
<span id="cartTotal" class="float-end">$0.00</span>
</h5>
<button id="checkoutButton" class="btn btn-dark w-100 mt-3" onclick="showCheckout()">Checkout</button>
</div>

</div>

<script>

// =====================================================
// IMPORTANT: paste your Apps Script /exec URL below
// =====================================================
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxEyxDkLd6lcvq8_Fke-0cAJZoMozaMOJ6lsw1K_1hA3fAn6oqozP0XtVy90h2coGQU-w/exec";

let products = [];
let filteredProducts = [];
let currency = "$";
let cart = [];

document.addEventListener("DOMContentLoaded", function () {
    loadStore();
    setInterval(loadStore, 10000);
});

// ===== JSONP helper (avoids Apps Script CORS issues) =====
function jsonp(url, params){

    return new Promise((resolve, reject) => {

        const callbackName = "jsonp_cb_" + Math.round(100000 * Math.random());
        params = params || {};
        params.callback = callbackName;

        const query = Object.keys(params)
            .map(k => encodeURIComponent(k) + "=" + encodeURIComponent(params[k]))
            .join("&");

        const script = document.createElement("script");
        script.src = url + (url.indexOf("?") >= 0 ? "&" : "?") + query;

        window[callbackName] = function(data){
            resolve(data);
            delete window[callbackName];
            script.remove();
        };

        script.onerror = function(){
            reject(new Error("Request failed"));
            delete window[callbackName];
            script.remove();
        };

        document.body.appendChild(script);

    });

}

function loadStore(){

    jsonp(APPS_SCRIPT_URL, { action: "getShopData" })
        .then(data => {

            products = data.products || [];
            filteredProducts = [...products];
            currency = (data.settings && data.settings.Currency) || "$";

            renderCategories();
            renderProducts(filteredProducts);

        })
        .catch(err => {

            document.getElementById("productGrid").innerHTML = `
            <div class="col-12 text-center text-danger">
                <h3>Unable to load products</h3>
                <p>${err.message}</p>
            </div>
            `;

        });

}

function renderCategories(){

    const bar = document.getElementById("categoryBar");
    const categories = ["All", ...new Set(products.map(p=>p.Category))];

    bar.innerHTML="";

    categories.forEach(cat=>{

        const btn = document.createElement("button");
        btn.className="category-btn";
        btn.innerText=cat;
        btn.onclick=function(){

            if(cat=="All"){
                filteredProducts=[...products];
            }else{
                filteredProducts = products.filter(p=>p.Category===cat);
            }

            renderProducts(filteredProducts);

        };

        bar.appendChild(btn);

    });

}

function renderProducts(list){

    const grid = document.getElementById("productGrid");

    if(list.length===0){
        grid.innerHTML=`
        <div class="col-12 text-center">
            <h3>No Products Found</h3>
        </div>
        `;
        return;
    }

    grid.innerHTML="";

    list.forEach(product=>{

        grid.innerHTML+=`

<div class="col-6 col-md-4 col-lg-3">
<div class="card product-card">
<div class="product-image-wrap">
<img loading="lazy" src="${product.ImageURL}" class="card-img-top">
<button type="button" class="favorite-btn" aria-label="Add ${product.Name} to favorites" onclick="toggleFavorite(this, event)">
<i class="bi bi-heart"></i>
</button>
</div>
<div class="card-body">
<h5>${product.Name}</h5>
<p class="text-muted">${product.Description}</p>
<div class="price">${currency}${Number(product.Price).toFixed(2)}</div>
<button class="btn btn-cart mt-3" onclick="addToCart('${product.ID}')">
<i class="bi bi-bag-plus"></i>
Add To Cart
</button>
</div>
</div>
</div>

`;

    });

}

function toggleFavorite(button, event){

    event.stopPropagation();
    const icon = button.querySelector("i");

    if(icon.classList.contains("bi-heart")){
        icon.classList.remove("bi-heart");
        icon.classList.add("bi-heart-fill");
        button.classList.add("active");
    }else{
        icon.classList.remove("bi-heart-fill");
        icon.classList.add("bi-heart");
        button.classList.remove("active");
    }

}

document.getElementById("searchBox").addEventListener("keyup",function(){

    const keyword = this.value.toLowerCase();

    filteredProducts = products.filter(p=>
        p.Name.toLowerCase().includes(keyword)
        ||
        p.Category.toLowerCase().includes(keyword)
    );

    renderProducts(filteredProducts);

});

function addToCart(id){

    const product = products.find(p=>p.ID==id);
    if(!product) return;

    const existing = cart.find(i=>i.ID===id);

    if(existing){
        existing.qty++;
    }else{
        cart.push({...product, qty:1});
    }

    updateCartButton();
    renderCart();

}

function updateCartButton(){

    const total = cart.reduce((sum,item)=>sum+item.qty, 0);

    document.getElementById("cartButton").innerHTML = `
<i class="bi bi-bag"></i>
Cart (${total})
`;

}

function openCart(){

    document.getElementById("cartOverlay").style.display="block";
    document.getElementById("cartPanel").classList.add("open");
    renderCart();

}

function closeCart(){

    document.getElementById("cartOverlay").style.display="none";
    document.getElementById("cartPanel").classList.remove("open");

}

document.getElementById("cartOverlay").onclick=closeCart;

function renderCart(){

    const container = document.getElementById("cartItems");

    if(cart.length==0){
        container.innerHTML=`
        <p class="text-center text-muted">
        Your shopping bag is empty.
        </p>
        `;
        document.getElementById("cartTotal").innerHTML=currency+"0.00";
        return;
    }

    let total=0;
    container.innerHTML="";

    cart.forEach(item=>{

        total+=item.Price*item.qty;

        container.innerHTML += `

<div class="card border-0 shadow-sm mb-3">
<div class="card-body">
<div class="d-flex">
<img src="${item.ImageURL}" style="width:80px;height:100px;object-fit:cover;border-radius:10px;">
<div class="ms-3 flex-grow-1">
<h6 class="mb-1">${item.Name}</h6>
<div class="text-muted small">${item.Description}</div>
<div class="fw-bold mt-2">${currency}${Number(item.Price).toFixed(2)}</div>
<div class="d-flex align-items-center mt-3">
<button class="btn btn-outline-dark btn-sm" onclick="changeQty('${item.ID}',-1)">
<i class="bi bi-dash"></i>
</button>
<span class="mx-3 fw-bold">${item.qty}</span>
<button class="btn btn-dark btn-sm" onclick="changeQty('${item.ID}',1)">
<i class="bi bi-plus"></i>
</button>
</div>
<div class="mt-3">
<button class="btn btn-link text-danger p-0" onclick="removeItem('${item.ID}')">
<i class="bi bi-trash"></i>
Remove
</button>
</div>
</div>
</div>
</div>
</div>

`;

    });

    document.getElementById("cartTotal").innerHTML = currency+total.toFixed(2);

}

function changeQty(id, amount){

    const item = cart.find(i=>i.ID===id);
    if(!item) return;

    item.qty += amount;

    if(item.qty <= 0){
        cart = cart.filter(i=>i.ID!==id);
    }

    updateCartButton();
    renderCart();

}

function removeItem(id){

    cart = cart.filter(item=>item.ID!==id);
    updateCartButton();
    renderCart();

}

function showCheckout(){

    const container = document.getElementById("cartItems");

    container.innerHTML = `

<h4 class="mb-4">Checkout</h4>

<div class="mb-3">
<label class="form-label">Full Name</label>
<input id="customerName" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Phone Number</label>
<input id="customerPhone" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Delivery Address</label>
<textarea id="customerAddress" class="form-control" rows="3"></textarea>
</div>

<button class="btn btn-dark w-100" onclick="placeOrder()">
Place Order
</button>

`;

    document.getElementById("checkoutButton").style.display = "none";

}

function placeOrder(){

    const name = document.getElementById("customerName").value.trim();
    const phone = document.getElementById("customerPhone").value.trim();
    const address = document.getElementById("customerAddress").value.trim();

    if(name=="" || phone=="" || address==""){
        alert("Please complete all fields.");
        return;
    }

    const total = cart.reduce((sum,item)=>sum+(item.Price*item.qty), 0);

    jsonp(APPS_SCRIPT_URL, {
        action: "submitOrder",
        customerDetails: JSON.stringify({ name, phone, address }),
        cartItems: JSON.stringify(cart),
        totalPrice: total
    })
    .then(orderSuccess)
    .catch(err => alert(err.message));

}

function orderSuccess(response){

    if(!response.success){
        alert(response.error);
        return;
    }

    document.getElementById("cartItems").innerHTML = `

<div class="text-center py-5">
<i class="bi bi-check-circle-fill text-success" style="font-size:70px;"></i>
<h3 class="mt-4">Order Successful!</h3>
<p class="text-muted">Thank you for shopping with us.</p>
<div class="alert alert-light mt-4">
Order Number
<br><br>
<b>${response.orderId}</b>
</div>
<button class="btn btn-dark mt-3" onclick="finishShopping()">
Continue Shopping
</button>
</div>

`;

    cart=[];
    updateCartButton();
    document.getElementById("cartTotal").innerHTML=currency+"0.00";

}

function finishShopping(){

    cart = [];
    updateCartButton();
    renderCart();
    closeCart();
    document.getElementById("checkoutButton").style.display = "block";

}

</script>

</body>

</html>
